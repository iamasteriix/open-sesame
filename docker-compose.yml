services:
  base:
    image: open-sesame
    build:
      context: .
      target: development

  server:
    image: open-sesame
    environment:
      PG_PASSWORD: ${PG_PASSWORD}
    command: npm run dev --workspace=apps/server
    volumes:
      - .:/app
      - server_root_modules:/app/node_modules
      - server_workspace_modules:/app/apps/server/node_modules
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: opensesamedb
      POSTGRES_USER: opensesame
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opensesame -d opensesamedb"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis:
    image: redis:8
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  web:
    image: open-sesame
    command: npm run dev --workspace=apps/web -- --host 0.0.0.0
    volumes:
      - .:/app
      - web_root_modules:/app/node_modules
      - web_workspace_modules:/app/apps/web/node_modules
    ports:
      - "3000:3000"

volumes:
  server_root_modules:
  server_workspace_modules:
  postgres_data:
  redis_data:
  web_root_modules:
  web_workspace_modules:
